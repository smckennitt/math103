<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math 10-3 Alien Attack</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0b0c10;
            color: #66fcf1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        h1 {
            margin: 0 0 5px 0;
            color: #45a29e;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 2em;
            text-align: center;
        }
        .instructions {
            margin-bottom: 15px;
            color: #c5c6c7;
            font-weight: bold;
            text-align: center;
        }
        .game-wrapper {
            position: relative;
            max-width: 100%;
        }
        canvas {
            background-color: #1f2833;
            border: 4px solid #45a29e;
            border-radius: 10px;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.3);
            display: block;
        }
        #summaryScreen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(11, 12, 16, 0.95);
            border: 2px solid #45a29e;
            padding: 25px;
            border-radius: 10px;
            width: 80%;
            max-width: 650px;
            max-height: 350px;
            overflow-y: auto;
            color: #c5c6c7;
            z-index: 20; 
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }
        #summaryScreen h2 { margin-top: 0; color: #66fcf1; text-align: center; }
        .summary-item {
            margin-bottom: 15px;
            border-bottom: 1px solid #1f2833;
            padding-bottom: 10px;
            font-size: 0.95em;
        }
        .summary-item:last-child { border-bottom: none; }
        .summary-incorrect { color: #e74c3c; }
        .summary-correct { color: #2ecc71; }
        
        #summaryScreen::-webkit-scrollbar { width: 8px; }
        #summaryScreen::-webkit-scrollbar-track { background: #1f2833; border-radius: 4px; }
        #summaryScreen::-webkit-scrollbar-thumb { background: #45a29e; border-radius: 4px; }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2em;
            background-color: #66fcf1;
            color: #0b0c10;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            transition: transform 0.2s, background-color 0.2s;
        }
        button:hover {
            background-color: #45a29e;
            transform: scale(1.05);
        }
        #restartBtn { display: none; }
        .close-btn { background-color: #e74c3c; color: white; margin-top: 10px; width: 100%; }
        .close-btn:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <h1>MATH 10-3: ALIEN ATTACK</h1>
    <div class="instructions">Calculate the paycheck to save the galaxy!</div>
    
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="summaryScreen"></div>
    </div>
    
    <div class="btn-group">
        <button id="restartBtn" onclick="resetGame()">PLAY AGAIN</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const restartBtn = document.getElementById('restartBtn');
    const summaryScreen = document.getElementById('summaryScreen');

    let audioCtx;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(type, pitchMultiplier = 1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        if (type === 'shoot') {
            osc.type = 'sawtooth';
            const baseFreq = 800;
            const finalFreq = 100;
            osc.frequency.setValueAtTime(baseFreq * pitchMultiplier, now);
            osc.frequency.exponentialRampToValueAtTime(finalFreq, now + 0.15);
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
        } else if (type === 'win') {
            osc.type = 'triangle';
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                osc.frequency.setValueAtTime(freq, now + i*0.15);
            });
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
            osc.start(now);
            osc.stop(now + 0.6);
        } else if (type === 'error') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.3);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        }
    }

    // Game States: 'START', 'PLAYING', 'GAMEOVER'
    let gameState = 'START'; 
    let score = 0;
    let questionNumber = 1;
    const totalQuestions = 10;
    let targets = [];
    let confetti = [];
    let history = []; 
    let currentQuestion = "";
    let correctFormula = "";
    let correctAnswer = 0;
    let animationId;
    let flashColor = null;
    let flashTimer = 0;
    let feedbackMsg = "";
    let pauseTimer = 0;
    let lasers = [];
    
    // End-screen variables
    let finalAliens = [];
    let alienHue = 0; 
    let bonusScore = 0;
    let comboMultiplier = 1;
    let lastComboHitTime = 0;
    const COMBO_TIMEOUT = 1000; 

    const alienEmojis = ['👾', '👽', '🛸', '🤖'];

    class ConfettiParticle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height - canvas.height;
            this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            this.size = Math.random() * 10 + 5;
            this.speedY = Math.random() * 3 + 2;
            this.speedX = (Math.random() - 0.5) * 2;
            this.rotation = Math.random() * 360;
            this.rotSpeed = (Math.random() - 0.5) * 10;
        }
        update() {
            this.y += this.speedY;
            this.x += this.speedX;
            this.rotation += this.rotSpeed;
            if (this.y > canvas.height) this.y = -10;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation * Math.PI / 180);
            ctx.fillStyle = this.color;
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
            ctx.restore();
        }
    }

    class FinalScreenAlien {
        constructor(isCentral) {
            this.isCentral = isCentral;
            this.radius = isCentral ? 70 : 35;
            this.x = isCentral ? canvas.width / 2 : Math.random() * canvas.width;
            this.y = isCentral ? canvas.height / 2 + 20 : Math.random() * (canvas.height - 150) + 120;
            
            if (!isCentral) {
                this.dx = (Math.random() - 0.5) * 2;
                this.dy = (Math.random() - 0.5) * 2;
                while (Math.abs(this.x - canvas.width/2) < 150 && Math.abs(this.y - (canvas.height/2+20)) < 150) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * (canvas.height - 150) + 120;
                }
            } else {
                this.dx = 0; this.dy = 0;
            }
            this.emoji = alienEmojis[Math.floor(Math.random() * alienEmojis.length)];
            this.baseHue = Math.random() * 360;
            this.baseSize = isCentral ? 120 : 60;
            this.baseHandsSize = isCentral ? 50 : 25;
        }

        panic(targetX, targetY) {
            if (this.isCentral) return;
            // Calculate direction to the mouse click
            const dx = targetX - this.x;
            const dy = targetY - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 0) {
                // Swarm towards the laser blast quickly
                this.dx = (dx / dist) * 7;
                this.dy = (dy / dist) * 7;
            }
        }

        update(time) {
            if (!this.isCentral) {
                if (this.x + this.radius > canvas.width || this.x - this.radius < 0) this.dx *= -1;
                if (this.y + this.radius > canvas.height || this.y - this.radius < 100) this.dy *= -1;
                this.x += this.dx;
                this.y += this.dy;
            }
            this.draw(time);
        }

        draw(time) {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            if (this.isCentral) {
                ctx.filter = `hue-rotate(${alienHue}deg)`;
            } else {
                ctx.filter = `hue-rotate(${this.baseHue + Math.sin(time / 500) * 30}deg)`;
            }
            
            const bobFreq = this.isCentral ? 150 : (200 + Math.random()*50);
            const rotFreq = this.isCentral ? 200 : (250 + Math.random()*50);
            const bobOffset = this.isCentral ? 20 : 10;
            const rotOffset = this.isCentral ? 0.2 : 0.1;

            ctx.translate(0, Math.sin(time / bobFreq) * bobOffset); 
            ctx.rotate(Math.sin(time / rotFreq) * rotOffset);
            
            ctx.font = `${this.baseSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.emoji, 0, 0);
            
            if (score === 10 || this.isCentral) {
                ctx.font = `${this.baseHandsSize}px Arial`;
                ctx.fillText('🙌', 0, - (this.baseSize * 0.75));
            }
            
            ctx.restore();
        }
    }

    class Target {
        constructor(x, y, value, isCorrect) {
            this.x = x;
            this.y = y;
            this.value = value;
            this.isCorrect = isCorrect;
            this.radius = 45;
            this.dx = (Math.random() - 0.5) * 2.5;
            this.dy = (Math.random() - 0.5) * 2.5;
            this.emoji = alienEmojis[Math.floor(Math.random() * alienEmojis.length)];
        }

        draw() {
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.emoji, this.x, this.y - 15);

            ctx.fillStyle = '#66fcf1';
            ctx.font = 'bold 22px Courier New';
            ctx.fillText('$' + this.value, this.x, this.y + 25);
        }

        update() {
            if (this.x + this.radius > canvas.width || this.x - this.radius < 0) this.dx *= -1;
            if (this.y + this.radius > canvas.height || this.y - this.radius < 100) this.dy *= -1;

            this.x += this.dx;
            this.y += this.dy;
            this.draw();
        }
    }

    function generateScenario() {
        targets = [];
        feedbackMsg = "";
        
        let gross, deductions, net;
        let offsets = [];

        if (questionNumber <= 4) {
            gross = (Math.floor(Math.random() * 5) + 2) * 100; 
            deductions = (Math.floor(Math.random() * 4) + 1) * 10; 
            net = gross - deductions;

            currentQuestion = `Gross: $${gross} | Deductions: $${deductions} | Shoot NET PAY!`;
            correctAnswer = net;
            correctFormula = `Gross ($${gross}) - Deductions ($${deductions}) = Net ($${net})`;
            offsets = [10, 20, 50, 100];
            
        } else if (questionNumber <= 7) {
            net = (Math.floor(Math.random() * 6) + 4) * 50; 
            deductions = (Math.floor(Math.random() * 4) + 2) * 20; 
            gross = net + deductions;

            currentQuestion = `Net: $${net} | Deductions: $${deductions} | Shoot GROSS PAY!`;
            correctAnswer = gross;
            correctFormula = `Net ($${net}) + Deductions ($${deductions}) = Gross ($${gross})`;
            offsets = [20, 40, 50, 100];

        } else {
            gross = (Math.floor(Math.random() * 6) + 12) * 25; 
            deductions = (Math.floor(Math.random() * 5) + 3) * 15; 
            net = gross - deductions;

            currentQuestion = `Gross: $${gross} | Net: $${net} | Shoot DEDUCTIONS!`;
            correctAnswer = deductions;
            correctFormula = `Gross ($${gross}) - Net ($${net}) = Deductions ($${deductions})`;
            offsets = [15, 25, 35, 50];
        }

        let answers = [correctAnswer];
        while (answers.length < 4) {
            let offset = offsets[Math.floor(Math.random() * offsets.length)];
            let isAdding = Math.random() > 0.5;
            let wrongAns = isAdding ? correctAnswer + offset : correctAnswer - offset;
            if (!answers.includes(wrongAns) && wrongAns > 0) answers.push(wrongAns);
        }

        answers.sort(() => Math.random() - 0.5);

        answers.forEach(ans => {
            let safeX = Math.random() * (canvas.width - 120) + 60;
            let safeY = Math.random() * (canvas.height - 180) + 120;
            targets.push(new Target(safeX, safeY, ans, ans === correctAnswer));
        });
    }

    function drawStartScreen(time) {
        ctx.fillStyle = '#1f2833';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#66fcf1';
        ctx.font = 'bold 50px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText("MATH 10-3", canvas.width / 2, canvas.height / 2 - 60);
        ctx.fillText("ALIEN ATTACK", canvas.width / 2, canvas.height / 2 - 10);

        ctx.fillStyle = '#f1c40f';
        ctx.font = 'bold 24px Courier New';
        ctx.fillText("Gross Pay, Net Pay & Deductions", canvas.width / 2, canvas.height / 2 + 40);

        // Pulsing text effect
        ctx.fillStyle = `rgba(197, 198, 199, ${0.5 + Math.sin(time / 200) * 0.5})`;
        ctx.font = 'bold 22px Courier New';
        ctx.fillText("- CLICK ANYWHERE TO START -", canvas.width / 2, canvas.height / 2 + 110);
    }

    function drawUI() {
        ctx.fillStyle = '#0b0c10';
        ctx.fillRect(0, 0, canvas.width, 100);
        ctx.strokeStyle = '#45a29e';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 100);
        ctx.lineTo(canvas.width, 100);
        ctx.stroke();

        ctx.fillStyle = '#c5c6c7';
        ctx.font = 'bold 20px Courier New';
        ctx.textAlign = 'left';
        ctx.fillText(`WAVE: ${questionNumber}/${totalQuestions}`, 20, 40);

        ctx.textAlign = 'right';
        ctx.fillStyle = '#66fcf1';
        ctx.fillText(`SCORE: ${score}`, canvas.width - 20, 40);

        ctx.textAlign = 'center';
        ctx.fillStyle = '#f1c40f';
        ctx.font = 'bold 22px Courier New';
        ctx.fillText(currentQuestion, canvas.width / 2, 80);

        if (flashTimer > 0) {
            ctx.fillStyle = flashColor;
            ctx.fillRect(0, 100, canvas.width, canvas.height - 100);
            flashTimer--;
        }

        if (feedbackMsg !== "") {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 100, canvas.width, canvas.height - 100);
            
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 36px Courier New';
            ctx.fillText("MISSED!", canvas.width / 2, canvas.height / 2 - 30);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Courier New';
            ctx.fillText(feedbackMsg, canvas.width / 2, canvas.height / 2 + 20);
        }
    }

    function drawLasers() {
        for (let i = lasers.length - 1; i >= 0; i--) {
            let l = lasers[i];
            ctx.beginPath();
            ctx.moveTo(l.startX, l.startY);
            ctx.lineTo(l.endX, l.endY);
            ctx.strokeStyle = `rgba(102, 252, 241, ${l.life / 10})`;
            ctx.lineWidth = 4;
            ctx.stroke();
            l.life--;
            if (l.life <= 0) lasers.splice(i, 1);
        }
    }

    function showSummary() {
        let html = '<h2>Teacher Summary</h2>';
        
        if (score === 10) {
            html += '<p style="text-align:center; color:#2ecc71; font-size:1.2em;">Flawless victory! No mistakes to report.</p>';
        } else {
            html += '<p style="text-align:center; color:#f1c40f;">Questions to review:</p>';
            history.forEach(item => {
                if (!item.isRight) {
                    html += `
                    <div class="summary-item">
                        <strong>Wave ${item.qNum}:</strong> ${item.question}<br>
                        Student Answer: <span class="summary-incorrect">$${item.chosen}</span> | 
                        Correct Answer: <span class="summary-correct">$${item.correct}</span><br>
                        <em>Review Formula: ${item.formula}</em>
                    </div>`;
                }
            });
        }
        html += '<button class="close-btn" onclick="closeSummary()">Close Summary & Disco Party</button>';
        
        summaryScreen.innerHTML = html;
        summaryScreen.style.display = 'block';
    }

    function closeSummary() {
        summaryScreen.style.display = 'none';
        summaryScreen.style.zIndex = -10; 
    }

    function gameLoop(timestamp) {
        if (gameState === 'START') {
            drawStartScreen(timestamp);
            drawLasers(); // Show laser if they click
            animationId = requestAnimationFrame(gameLoop);
            return;
        }

        ctx.fillStyle = '#1f2833';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === 'GAMEOVER') {
            if (timestamp - lastComboHitTime > COMBO_TIMEOUT && comboMultiplier > 1) {
                comboMultiplier = 1; 
            }

            finalAliens.forEach(alien => alien.update(timestamp));
            drawLasers();

            if (score === 10) confetti.forEach(c => { c.update(); c.draw(); });
            
            ctx.textAlign = 'center';
            if (score === 10) {
                ctx.fillStyle = '#66fcf1';
                ctx.font = 'bold 45px Courier New';
                ctx.fillText("PERFECT 10/10!", canvas.width / 2, 60);
            } else {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px Courier New';
                ctx.fillText("INVASION COMPLETE", canvas.width / 2, 60);
                
                ctx.fillStyle = score >= 5 ? '#f1c40f' : '#e74c3c';
                ctx.font = 'bold 36px Courier New';
                ctx.fillText(`FINAL SCORE: ${score} / ${totalQuestions}`, canvas.width / 2, 100);
            }

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Courier New';
            ctx.textAlign = 'left';
            ctx.fillText(`BONUS POINTS: ${bonusScore}`, 20, canvas.height - 30);

            if (comboMultiplier > 1) {
                if (Math.floor(timestamp / 100) % 2 === 0) ctx.fillStyle = `hsl(${(alienHue + 180)%360}, 100%, 50%)`;
                else ctx.fillStyle = '#f1c40f';
                
                ctx.textAlign = 'right';
                ctx.font = 'bold 30px Courier New';
                ctx.fillText(`${comboMultiplier}x COMBO!`, canvas.width - 20, canvas.height - 30);
            } else {
                ctx.textAlign = 'right';
                ctx.fillStyle = '#c5c6c7';
                ctx.font = 'bold 18px Courier New';
                ctx.fillText(`Blast Central Alien fast!`, canvas.width - 20, canvas.height - 30);
            }
            
            animationId = requestAnimationFrame(gameLoop);
            return;
        }

        drawUI();
        drawLasers();

        if (pauseTimer > 0) {
            pauseTimer--;
            if (pauseTimer <= 0) {
                questionNumber++;
                if (questionNumber > totalQuestions) endGame();
                else generateScenario();
            }
        } else {
            targets.forEach(target => target.update());
        }

        animationId = requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousedown', (e) => {
        initAudio(); 
        
        if (summaryScreen.style.display === 'block' || pauseTimer > 0) return; 

        const rect = canvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;

        lasers.push({ startX: canvas.width/2, startY: canvas.height, endX: clickX, endY: clickY, life: 10 });
        playSound('shoot', 1);

        // --- Handle Click on START Screen ---
        if (gameState === 'START') {
            gameState = 'PLAYING';
            generateScenario();
            return;
        }

        // --- Handle Click on GAMEOVER Screen ---
        if (gameState === 'GAMEOVER') {
            const centralAlien = finalAliens[0];
            const dist = Math.sqrt((clickX - centralAlien.x) ** 2 + (clickY - centralAlien.y) ** 2);
            
            // Panic the background aliens!
            finalAliens.forEach(alien => alien.panic(clickX, clickY));

            if (dist <= 70) {
                const now = performance.now();
                const comboWindowActive = (now - lastComboHitTime) < COMBO_TIMEOUT;

                if (comboWindowActive) {
                    comboMultiplier++;
                } else {
                    comboMultiplier = 1;
                }

                bonusScore += Math.floor(100 * comboMultiplier);
                
                const pitch = Math.min(2.5, 1 + (comboMultiplier * 0.1));
                playSound('shoot', pitch);

                alienHue += Math.floor(Math.random() * 120) + 50; 
                ctx.fillStyle = `hsla(${(alienHue+180)%360}, 100%, 50%, 0.2)`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                lastComboHitTime = now; 
            } else {
                comboMultiplier = 1;
            }
            return; 
        }

        // --- Standard Gameplay Target Logic ---
        let hit = false;
        targets.forEach((target) => {
            const dist = Math.sqrt((clickX - target.x) ** 2 + (clickY - target.y) ** 2);
            if (dist <= target.radius && !hit) {
                hit = true;
                
                history.push({
                    qNum: questionNumber,
                    question: currentQuestion,
                    chosen: target.value,
                    correct: correctAnswer,
                    isRight: target.isCorrect,
                    formula: correctFormula
                });

                if (target.isCorrect) {
                    score++;
                    flashColor = 'rgba(102, 252, 241, 0.3)'; 
                    flashTimer = 10;
                    
                    setTimeout(() => {
                        questionNumber++;
                        if (questionNumber > totalQuestions) endGame();
                        else generateScenario();
                    }, 200);
                } else {
                    playSound('error');
                    flashColor = 'rgba(231, 76, 60, 0.4)'; 
                    flashTimer = 10;
                    feedbackMsg = correctFormula;
                    pauseTimer = 180; 
                }
            }
        });
    });

    function endGame() {
        gameState = 'GAMEOVER';
        alienHue = 0; 
        bonusScore = 0; 
        comboMultiplier = 1;
        
        finalAliens = [];
        finalAliens.push(new FinalScreenAlien(true));
        const numPartyAliens = Math.random() * 15 + (score === 10 ? 30 : 15);
        for(let i=0; i<numPartyAliens; i++){
            finalAliens.push(new FinalScreenAlien(false));
        }

        restartBtn.style.display = 'block';
        showSummary(); 
        
        if (score === 10) {
            playSound('win');
            for(let i = 0; i < 150; i++) {
                confetti.push(new ConfettiParticle());
            }
        }
    }

    function resetGame() {
        gameState = 'PLAYING';
        score = 0;
        questionNumber = 1;
        confetti = [];
        lasers = [];
        history = [];
        alienHue = 0;
        bonusScore = 0;
        finalAliens = [];
        summaryScreen.style.display = 'none'; 
        summaryScreen.style.zIndex = 20; 
        restartBtn.style.display = 'none';
        generateScenario();
    }

    // Start Animation Loop (waits on Intro Screen)
    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
