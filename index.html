<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math 10-3 Alien Attack</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0b0c10;
            color: #66fcf1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        h1 {
            margin: 0 0 5px 0;
            color: #45a29e;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 2em;
            text-align: center;
        }
        .instructions {
            margin-bottom: 15px;
            color: #c5c6c7;
            font-weight: bold;
            text-align: center;
        }
        .game-wrapper {
            position: relative;
            max-width: 100%;
        }
        canvas {
            background-color: #1f2833;
            border: 4px solid #45a29e;
            border-radius: 10px;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.3);
            display: block;
        }
        .overlay-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(11, 12, 16, 0.95);
            border: 2px solid #45a29e;
            padding: 30px;
            border-radius: 10px;
            width: 80%;
            max-width: 650px;
            max-height: 350px;
            overflow-y: auto;
            color: #c5c6c7;
            z-index: 20; 
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            text-align: center;
        }
        .overlay-screen h2 { margin-top: 0; color: #66fcf1; text-align: center; font-size: 2em;}
        .summary-item {
            margin-bottom: 15px;
            border-bottom: 1px solid #1f2833;
            padding-bottom: 10px;
            font-size: 0.95em;
            text-align: left;
        }
        .summary-item:last-child { border-bottom: none; }
        .summary-incorrect { color: #e74c3c; font-weight: bold; }
        .summary-correct { color: #2ecc71; font-weight: bold; }
        
        .overlay-screen::-webkit-scrollbar { width: 8px; }
        .overlay-screen::-webkit-scrollbar-track { background: #1f2833; border-radius: 4px; }
        .overlay-screen::-webkit-scrollbar-thumb { background: #45a29e; border-radius: 4px; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2em;
            background-color: #66fcf1;
            color: #0b0c10;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            transition: transform 0.2s, background-color 0.2s;
        }
        button:hover {
            background-color: #45a29e;
            transform: scale(1.02);
        }
        #restartBtn { display: none; margin-top: 20px;}
        .close-btn { background-color: #e74c3c; color: white; margin-top: 20px; width: 100%; }
        .close-btn:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <h1>MATH 10-3: ALIEN ATTACK</h1>
    <div class="instructions">Calculate the paycheck to save the galaxy!</div>
    
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div id="selectionScreen" class="overlay-screen">
            <h2>SELECT MISSION</h2>
            <div class="btn-group">
                <button onclick="startGameMode(1)">MISSION 1: Gross, Net & Deductions</button>
                <button onclick="startGameMode(2)">MISSION 2: Salary, Wages & Commission</button>
            </div>
        </div>

        <div id="summaryScreen" class="overlay-screen"></div>
    </div>
    
    <button id="restartBtn" onclick="returnToMenu()">MAIN MENU</button>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const restartBtn = document.getElementById('restartBtn');
    const summaryScreen = document.getElementById('summaryScreen');
    const selectionScreen = document.getElementById('selectionScreen');

    let audioCtx;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(type, pitchMultiplier = 1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;
        if (type === 'shoot') {
            osc.type = 'sawtooth';
            const baseFreq = 800;
            const finalFreq = 100;
            osc.frequency.setValueAtTime(baseFreq * pitchMultiplier, now);
            osc.frequency.exponentialRampToValueAtTime(finalFreq, now + 0.15);
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
        } else if (type === 'win') {
            osc.type = 'triangle';
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                osc.frequency.setValueAtTime(freq, now + i*0.15);
            });
            gainNode.gain.setValueAtTime(0.2, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
            osc.start(now);
            osc.stop(now + 0.6);
        } else if (type === 'error') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.3);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        }
    }

    function formatMoney(num) {
        return num % 1 !== 0 ? num.toFixed(2) : num;
    }

    let gameState = 'START'; 
    let gameMode = 1; 
    let score = 0;
    let questionNumber = 1;
    const totalQuestions = 10;
    let targets = [];
    let confetti = [];
    let history = []; 
    let currentQuestion = "";
    let correctFormula = "";
    let correctAnswer = 0;
    let animationId;
    let flashColor = null;
    let flashTimer = 0;
    let feedbackMsg = "";
    let pauseTimer = 0;
    let lasers = [];
    
    let lastTime = 0;
    let timeRemaining = 30;
    let isTimerActive = false;
    let currentSpeedMult = 1;

    let finalAliens = [];
    let alienHue = 0; 
    let bonusScore = 0;
    let comboMultiplier = 1;
    let lastComboHitTime = 0;
    const COMBO_TIMEOUT = 1000; 

    const alienEmojis = ['👾', '👽', '🛸', '🤖'];

    class ConfettiParticle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height - canvas.height;
            this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            this.size = Math.random() * 10 + 5;
            this.speedY = Math.random() * 3 + 2;
            this.speedX = (Math.random() - 0.5) * 2;
            this.rotation = Math.random() * 360;
            this.rotSpeed = (Math.random() - 0.5) * 10;
        }
        update() {
            this.y += this.speedY;
            this.x += this.speedX;
            this.rotation += this.rotSpeed;
            if (this.y > canvas.height) this.y = -10;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation * Math.PI / 180);
            ctx.fillStyle = this.color;
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
            ctx.restore();
        }
    }

    class FinalScreenAlien {
        constructor(isCentral) {
            this.isCentral = isCentral;
            this.radius = isCentral ? 70 : 35;
            this.x = isCentral ? canvas.width / 2 : Math.random() * canvas.width;
            this.y = isCentral ? canvas.height / 2 + 20 : Math.random() * (canvas.height - 150) + 120;
            
            if (!isCentral) {
                this.dx = (Math.random() - 0.5) * 2;
                this.dy = (Math.random() - 0.5) * 2;
                while (Math.abs(this.x - canvas.width/2) < 150 && Math.abs(this.y - (canvas.height/2+20)) < 150) {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * (canvas.height - 150) + 120;
                }
            } else {
                this.dx = 0; this.dy = 0;
            }
            this.emoji = alienEmojis[Math.floor(Math.random() * alienEmojis.length)];
            this.baseHue = Math.random() * 360;
            this.baseSize = isCentral ? 120 : 60;
            this.baseHandsSize = isCentral ? 50 : 25;
        }

        panic(targetX, targetY) {
            if (this.isCentral) return;
            const dx = targetX - this.x;
            const dy = targetY - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 0) {
                this.dx = (dx / dist) * 7;
                this.dy = (dy / dist) * 7;
            }
        }

        update(time) {
            if (!this.isCentral) {
                if (this.x + this.radius > canvas.width || this.x - this.radius < 0) this.dx *= -1;
                if (this.y + this.radius > canvas.height || this.y - this.radius < 100) this.dy *= -1;
                this.x += this.dx;
                this.y += this.dy;
            }
            this.draw(time);
        }

        draw(time) {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            if (this.isCentral) {
                ctx.filter = `hue-rotate(${alienHue}deg)`;
            } else {
                ctx.filter = `hue-rotate(${this.baseHue + Math.sin(time / 500) * 30}deg)`;
            }
            
            const bobFreq = this.isCentral ? 150 : (200 + Math.random()*50);
            const rotFreq = this.isCentral ? 200 : (250 + Math.random()*50);
            const bobOffset = this.isCentral ? 20 : 10;
            const rotOffset = this.isCentral ? 0.2 : 0.1;

            ctx.translate(0, Math.sin(time / bobFreq) * bobOffset); 
            ctx.rotate(Math.sin(time / rotFreq) * rotOffset);
            
            ctx.font = `${this.baseSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.emoji, 0, 0);
            
            if (score === 10 || this.isCentral) {
                ctx.font = `${this.baseHandsSize}px Arial`;
                ctx.fillText('🙌', 0, - (this.baseSize * 0.75));
            }
            
            ctx.restore();
        }
    }

    class Target {
        constructor(x, y, value, isCorrect, speedMultiplier, prefix = '$') {
            this.x = x;
            this.y = y;
            this.value = value;
            this.isCorrect = isCorrect;
            this.prefix = prefix;
            this.radius = 45;
            
            let baseSpeed = Math.random() * 1.5 + 1.0; 
            this.dx = (Math.random() < 0.5 ? 1 : -1) * baseSpeed * speedMultiplier;
            this.dy = (Math.random() < 0.5 ? 1 : -1) * baseSpeed * speedMultiplier;
            
            this.emoji = alienEmojis[Math.floor(Math.random() * alienEmojis.length)];
        }

        draw() {
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.emoji, this.x, this.y - 15);

            ctx.fillStyle = '#66fcf1';
            
            let displayVal = this.value;
            if (this.prefix === '$' && typeof this.value === 'number') {
                if (this.value % 1 !== 0) {
                    displayVal = this.value.toFixed(2);
                }
            }

            if (typeof this.value === 'string' && this.value.length > 6) {
                ctx.font = 'bold 13px Courier New';
            } else {
                ctx.font = 'bold 22px Courier New';
            }
            
            ctx.fillText(this.prefix + displayVal, this.x, this.y + 25);
        }

        update() {
            if (this.x + this.radius > canvas.width || this.x - this.radius < 0) this.dx *= -1;
            if (this.y + this.radius > canvas.height || this.y - this.radius < 100) this.dy *= -1;

            this.x += this.dx;
            this.y += this.dy;
            this.draw();
        }
    }

    function startGameMode(mode) {
        gameMode = mode;
        selectionScreen.style.display = 'none';
        gameState = 'PLAYING';
        score = 0;
        questionNumber = 1;
        lastTime = performance.now();
        generateScenario();
    }

    function generateScenario() {
        targets = [];
        feedbackMsg = "";
        
        if (questionNumber <= 4) {
            currentSpeedMult = 1.0;
            isTimerActive = false;
        } else if (questionNumber <= 7) {
            currentSpeedMult = 1.6;
            isTimerActive = false;
        } else {
            currentSpeedMult = 2.8; 
            timeRemaining = 30.0;
            isTimerActive = true;
        }

        if (gameMode === 1) {
            generateDeductionsMath();
        } else {
            generateSalaryMath();
        }
    }

    function generateDeductionsMath() {
        let gross, deductions, net;
        let answers = [];
        let prefix = '$';

        if (questionNumber <= 4) {
            gross = (Math.floor(Math.random() * 5) + 2) * 100; 
            deductions = (Math.floor(Math.random() * 4) + 1) * 10; 
            net = gross - deductions;

            currentQuestion = `Gross: $${gross} | Deductions: $${deductions} | Shoot NET PAY!`;
            correctAnswer = net;
            correctFormula = `Gross ($${gross}) - Deductions ($${deductions}) = Net ($${net})`;
            answers = [net, net + 10, net - 20, net + 50, net + 100];
            
        } else if (questionNumber <= 7) {
            net = (Math.floor(Math.random() * 6) + 4) * 50; 
            deductions = (Math.floor(Math.random() * 4) + 2) * 20; 
            gross = net + deductions;

            currentQuestion = `Net: $${net} | Deductions: $${deductions} | Shoot GROSS PAY!`;
            correctAnswer = gross;
            correctFormula = `Net ($${net}) + Deductions ($${deductions}) = Gross ($${gross})`;
            answers = [gross, gross - 20, gross + 40, gross - 50, gross + 100];

        } else {
            gross = (Math.floor(Math.random() * 6) + 12) * 25; 
            deductions = (Math.floor(Math.random() * 5) + 3) * 15; 
            net = gross - deductions;

            currentQuestion = `Gross: $${gross} | Net: $${net} | Shoot DEDUCTIONS!`;
            correctAnswer = deductions;
            correctFormula = `Gross ($${gross}) - Net ($${net}) = Deductions ($${deductions})`;
            answers = [deductions, deductions + 15, deductions - 15, deductions + 25, deductions + 50];
        }

        let finalAnswers = [correctAnswer];
        for (let i = 1; i < answers.length && finalAnswers.length < 4; i++) {
            if (!finalAnswers.includes(answers[i]) && answers[i] > 0) {
                finalAnswers.push(answers[i]);
            }
        }

        finalAnswers.sort(() => Math.random() - 0.5);

        finalAnswers.forEach(ans => {
            let safeX = Math.random() * (canvas.width - 120) + 60;
            let safeY = Math.random() * (canvas.height - 180) + 120;
            targets.push(new Target(safeX, safeY, ans, ans === correctAnswer, currentSpeedMult, prefix));
        });
    }

    function generateSalaryMath() {
        let answers = [];
        let prefix = '$';

        if (questionNumber === 1) {
            if (Math.random() > 0.5) {
                currentQuestion = `Paid every two weeks. How many pay periods in a year?`;
                correctAnswer = 26;
                correctFormula = `52 weeks ÷ 2 = 26 pay periods.`;
                prefix = '';
                answers = [26, 24, 52, 12];
            } else {
                currentQuestion = `Paid weekly. How many pay periods in a year?`;
                correctAnswer = 52;
                correctFormula = `There are 52 weeks in a year = 52 pay periods.`;
                prefix = '';
                answers = [52, 26, 24, 12];
            }
        } else if (questionNumber === 2) {
            let pct = (Math.floor(Math.random() * 8) + 2) + 0.25 * Math.floor(Math.random() * 4); 
            let dec = (pct / 100).toFixed(4).replace(/0+$/, '').replace(/\.$/, ''); 
            currentQuestion = `Convert ${pct}% to a decimal!`;
            correctAnswer = dec;
            correctFormula = `${pct} ÷ 100 = ${dec}`;
            prefix = '';
            answers = [dec, (pct/10).toFixed(3), (pct).toFixed(2), (pct/1000).toFixed(5)];
        } else if (questionNumber === 3) {
            let base = (Math.floor(Math.random() * 16) + 20) * 10; 
            let ot = (Math.floor(Math.random() * 8) + 5) * 10; 
            let total = base + ot;
            currentQuestion = `Base pay: $${base} | Overtime pay: $${ot} | TOTAL PAY?`;
            correctAnswer = total;
            correctFormula = `Base ($${base}) + OT ($${ot}) = Total ($${total})`;
            answers = [total, base, ot, total + 50];
        } else if (questionNumber === 4) {
            let monthly = (Math.floor(Math.random() * 20) + 10) * 100; 
            let annual = monthly * 12;
            currentQuestion = `Salary: $${monthly}/month. Shoot ANNUAL INCOME!`;
            correctAnswer = annual;
            correctFormula = `$${monthly}/mo x 12 months = $${annual}`;
            answers = [annual, monthly * 10, monthly * 24, monthly * 52];
        } else if (questionNumber === 5) {
            let sell = (Math.floor(Math.random() * 5) + 4) * 10; 
            let cost = (Math.floor(Math.random() * 5) + 2) * 5; 
            let profit = sell - cost;
            currentQuestion = `Sell item for $${sell}. Materials cost $${cost}. PROFIT?`;
            correctAnswer = profit;
            correctFormula = `Revenue ($${sell}) - Cost ($${cost}) = Profit ($${profit})`;
            answers = [profit, sell + cost, cost, sell - cost + 10];
        } else if (questionNumber === 6) {
            if (Math.random() > 0.5) {
                currentQuestion = `What is ISOLATION PAY?`;
                correctAnswer = "RemoteBonus";
                correctFormula = "Isolation pay is extra money for working in remote areas.";
                prefix = '';
                answers = ["RemoteBonus", "Sick Pay", "VacationPay", "Union Dues"];
            } else {
                let base = (Math.floor(Math.random() * 20) + 20) * 100; 
                let iso = (Math.floor(Math.random() * 5) + 2) * 100; 
                let total = base + iso;
                currentQuestion = `Base: $${base} | Isolation Pay: $${iso} | TOTAL PAY?`;
                correctAnswer = total;
                correctFormula = `Base ($${base}) + Isolation ($${iso}) = Total ($${total})`;
                answers = [total, base - iso, base, iso];
            }
        } else if (questionNumber === 7) {
            let wage = Math.floor(Math.random() * 10) + 15; 
            let hrs = Math.floor(Math.random() * 6) + 4; 
            let pay = Math.round(wage * 1.5 * hrs * 100) / 100;
            currentQuestion = `Holiday! $${wage}/hr for ${hrs} hrs @ time-and-a-half. PAY?`;
            correctAnswer = pay;
            correctFormula = `$${wage} x 1.5 x ${hrs} hrs = $${formatMoney(pay)}`;
            answers = [pay, wage * hrs, wage * 2 * hrs, Math.round((wage * 1.5 * hrs + wage) * 100) / 100];
        } else if (questionNumber === 8) {
            let wage = Math.floor(Math.random() * 10) + 15; 
            let rate = wage * 2.5;
            currentQuestion = `Wage: $${wage}/hr. DOUBLE TIME AND A HALF rate?`;
            correctAnswer = rate;
            correctFormula = `$${wage} x 2.5 = $${formatMoney(rate)}/hr`;
            answers = [rate, wage * 2, wage * 1.5, wage * 3];
        } else if (questionNumber === 9) {
            let pct = Math.floor(Math.random() * 10) + 5; 
            let sale = (Math.floor(Math.random() * 40) + 10) * 100; 
            let comm = Math.round(sale * (pct / 100) * 100) / 100;
            currentQuestion = `${pct}% commission on a $${sale} sale. EARNINGS?`;
            correctAnswer = comm;
            correctFormula = `$${sale} x ${pct}% = $${formatMoney(comm)}`;
            answers = [comm, Math.round(sale * (pct/10) * 100)/100, comm + 100, Math.round(sale * 0.01 * 100)/100];
        } else {
            // Boss Level - Randomly picks one of the hard math scenarios
            let rand = Math.floor(Math.random() * 3);
            if (rand === 0) {
                 let wage = Math.floor(Math.random() * 10) + 15; 
                 let hrs = 8; 
                 let pay = Math.round(wage * 1.5 * hrs * 100) / 100;
                 currentQuestion = `Holiday! $${wage}/hr for ${hrs} hrs @ time-and-a-half. PAY?`;
                 correctAnswer = pay;
                 correctFormula = `$${wage} x 1.5 x ${hrs} hrs = $${formatMoney(pay)}`;
                 answers = [pay, wage * hrs, wage * 2 * hrs, Math.round((wage * 1.5 * hrs + wage) * 100) / 100];
            } else if (rand === 1) {
                let wage = Math.floor(Math.random() * 10) + 15; 
                let rate = wage * 2.5;
                currentQuestion = `Wage: $${wage}/hr. DOUBLE TIME AND A HALF rate?`;
                correctAnswer = rate;
                correctFormula = `$${wage} x 2.5 = $${formatMoney(rate)}/hr`;
                answers = [rate, wage * 2, wage * 1.5, wage * 3];
            } else {
                let sell = (Math.floor(Math.random() * 5) + 4) * 10; 
                let cost = (Math.floor(Math.random() * 5) + 2) * 5; 
                let profit = sell - cost;
                currentQuestion = `Sell item for $${sell}. Materials cost $${cost}. PROFIT?`;
                correctAnswer = profit;
                correctFormula = `Revenue ($${sell}) - Cost ($${cost}) = Profit ($${profit})`;
                answers = [profit, sell + cost, cost, sell - cost + 10];
            }
        }

        let finalAnswers = [correctAnswer];
        for (let i = 1; i < answers.length && finalAnswers.length < 4; i++) {
            if (!finalAnswers.includes(answers[i]) && answers[i] !== correctAnswer && answers[i] > 0) {
                finalAnswers.push(answers[i]);
            }
        }
        
        // Ensure 4 answers by adding offsets if necessary
        while(finalAnswers.length < 4) {
            let offset = Math.floor(Math.random() * 20) + 1;
            let wrong = typeof correctAnswer === 'number' ? correctAnswer + offset : correctAnswer + "X";
            if (!finalAnswers.includes(wrong)) {
                finalAnswers.push(wrong);
            }
        }

        finalAnswers.sort(() => Math.random() - 0.5);

        finalAnswers.forEach(ans => {
            let safeX = Math.random() * (canvas.width - 120) + 60;
            let safeY = Math.random() * (canvas.height - 180) + 120;
            targets.push(new Target(safeX, safeY, ans, ans === correctAnswer, currentSpeedMult, prefix));
        });
    }

    function drawStartScreen(time) {
        ctx.fillStyle = '#1f2833';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#66fcf1';
        ctx.font = 'bold 50px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText("MATH 10-3", canvas.width / 2, canvas.height / 2 - 60);
        ctx.fillText("ALIEN ATTACK", canvas.width / 2, canvas.height / 2 - 10);

        ctx.fillStyle = '#f1c40f';
        ctx.font = 'bold 24px Courier New';
        ctx.fillText("Save the Galaxy with Paycheck Math!", canvas.width / 2, canvas.height / 2 + 40);

        ctx.fillStyle = `rgba(197, 198, 199, ${0.5 + Math.sin(time / 200) * 0.5})`;
        ctx.font = 'bold 22px Courier New';
        ctx.fillText("- CLICK ANYWHERE TO START -", canvas.width / 2, canvas.height / 2 + 110);
    }

    function drawUI() {
        ctx.fillStyle = '#0b0c10';
        ctx.fillRect(0, 0, canvas.width, 100);
        ctx.strokeStyle = '#45a29e';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 100);
        ctx.lineTo(canvas.width, 100);
        ctx.stroke();

        ctx.fillStyle = '#c5c6c7';
        ctx.font = 'bold 20px Courier New';
        ctx.textAlign = 'left';
        ctx.fillText(`WAVE: ${questionNumber}/${totalQuestions}`, 20, 40);

        ctx.textAlign = 'right';
        ctx.fillStyle = '#66fcf1';
        ctx.fillText(`SCORE: ${score}`, canvas.width - 20, 40);

        if (isTimerActive) {
            ctx.textAlign = 'center';
            ctx.font = 'bold 26px Courier New';
            ctx.fillStyle = timeRemaining <= 5 ? '#e74c3c' : '#f1c40f';
            ctx.fillText(`TIME: ${Math.ceil(timeRemaining)}s`, canvas.width / 2, 40);
        }

        ctx.textAlign = 'center';
        ctx.fillStyle = '#f1c40f';
        ctx.font = 'bold 22px Courier New';
        ctx.fillText(currentQuestion, canvas.width / 2, 80);

        if (flashTimer > 0) {
            ctx.fillStyle = flashColor;
            ctx.fillRect(0, 100, canvas.width, canvas.height - 100);
            flashTimer--;
        }

        if (feedbackMsg !== "") {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 100, canvas.width, canvas.height - 100);
            
            ctx.fillStyle = '#e74c3c';
            ctx.font = 'bold 36px Courier New';
            ctx.fillText(feedbackMsg.includes("TIME'S UP") ? "TIME'S UP!" : "MISSED!", canvas.width / 2, canvas.height / 2 - 30);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Courier New';
            let displayFormula = feedbackMsg.replace("TIME'S UP! ", "");
            ctx.fillText(displayFormula, canvas.width / 2, canvas.height / 2 + 20);
        }
    }

    function drawLasers() {
        for (let i = lasers.length - 1; i >= 0; i--) {
            let l = lasers[i];
            ctx.beginPath();
            ctx.moveTo(l.startX, l.startY);
            ctx.lineTo(l.endX, l.endY);
            ctx.strokeStyle = `rgba(102, 252, 241, ${l.life / 10})`;
            ctx.lineWidth = 4;
            ctx.stroke();
            l.life--;
            if (l.life <= 0) lasers.splice(i, 1);
        }
    }

    function triggerTimeout() {
        history.push({
            qNum: questionNumber,
            question: currentQuestion,
            chosen: "Out of Time",
            correct: correctAnswer,
            isRight: false,
            formula: correctFormula
        });

        playSound('error');
        flashColor = 'rgba(231, 76, 60, 0.4)'; 
        flashTimer = 10;
        feedbackMsg = "TIME'S UP! " + correctFormula;
        pauseTimer = 180; 
        isTimerActive = false;
    }

    function showSummary() {
        let html = '<h2>Mission Report</h2>';
        
        if (score === 10) {
            html += '<p style="text-align:center; color:#2ecc71; font-size:1.2em;">Flawless victory! No mistakes to report.</p>';
        } else {
            html += '<p style="text-align:center; color:#f1c40f;">Questions to review:</p>';
            history.forEach(item => {
                if (!item.isRight) {
                    let prefix = typeof item.correct === 'number' && item.formula.includes('$') ? '$' : '';
                    let formatVal = (val) => (typeof val === 'number' && val % 1 !== 0) ? val.toFixed(2) : val;
                    
                    let chosenText = item.chosen === "Out of Time" ? item.chosen : `${prefix}${formatVal(item.chosen)}`;
                    
                    html += `
                    <div class="summary-item">
                        <strong>Wave ${item.qNum}:</strong> ${item.question}<br>
                        Student Answer: <span class="summary-incorrect">${chosenText}</span> | 
                        Correct Answer: <span class="summary-correct">${prefix}${formatVal(item.correct)}</span><br>
                        <em>Review Formula: ${item.formula}</em>
                    </div>`;
                }
            });
        }
        html += '<button class="close-btn" onclick="closeSummary()">Close Summary & Disco Party</button>';
        
        summaryScreen.innerHTML = html;
        summaryScreen.style.display = 'block';
    }

    function closeSummary() {
        summaryScreen.style.display = 'none';
        summaryScreen.style.zIndex = -10; 
    }

    function returnToMenu() {
        gameState = 'SELECTING';
        selectionScreen.style.display = 'block';
        restartBtn.style.display = 'none';
        summaryScreen.style.display = 'none';
        summaryScreen.style.zIndex = 20;
        ctx.fillStyle = '#1f2833';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function gameLoop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        let dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;

        if (gameState === 'START') {
            drawStartScreen(timestamp);
            drawLasers(); 
            animationId = requestAnimationFrame(gameLoop);
            return;
        }

        if (gameState === 'SELECTING') {
            drawLasers(); 
            animationId = requestAnimationFrame(gameLoop);
            return;
        }

        ctx.fillStyle = '#1f2833';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === 'GAMEOVER') {
            if (timestamp - lastComboHitTime > COMBO_TIMEOUT && comboMultiplier > 1) {
                comboMultiplier = 1; 
            }

            finalAliens.forEach(alien => alien.update(timestamp));
            drawLasers();

            if (score === 10) confetti.forEach(c => { c.update(); c.draw(); });
            
            ctx.textAlign = 'center';
            if (score === 10) {
                ctx.fillStyle = '#66fcf1';
                ctx.font = 'bold 45px Courier New';
                ctx.fillText("PERFECT 10/10!", canvas.width / 2, 60);
            } else {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 40px Courier New';
                ctx.fillText("INVASION COMPLETE", canvas.width / 2, 60);
                
                ctx.fillStyle = score >= 5 ? '#f1c40f' : '#e74c3c';
                ctx.font = 'bold 36px Courier New';
                ctx.fillText(`FINAL SCORE: ${score} / ${totalQuestions}`, canvas.width / 2, 100);
            }

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Courier New';
            ctx.textAlign = 'left';
            ctx.fillText(`BONUS POINTS: ${bonusScore}`, 20, canvas.height - 30);

            if (comboMultiplier > 1) {
                if (Math.floor(timestamp / 100) % 2 === 0) ctx.fillStyle = `hsl(${(alienHue + 180)%360}, 100%, 50%)`;
                else ctx.fillStyle = '#f1c40f';
                
                ctx.textAlign = 'right';
                ctx.font = 'bold 30px Courier New';
                ctx.fillText(`${comboMultiplier}x COMBO!`, canvas.width - 20, canvas.height - 30);
            } else {
                ctx.textAlign = 'right';
                ctx.fillStyle = '#c5c6c7';
                ctx.font = 'bold 18px Courier New';
                ctx.fillText(`Blast Central Alien fast!`, canvas.width - 20, canvas.height - 30);
            }
            
            animationId = requestAnimationFrame(gameLoop);
            return;
        }

        if (gameState === 'PLAYING' && pauseTimer <= 0) {
            if (isTimerActive) {
                timeRemaining -= dt;
                if (timeRemaining <= 0) {
                    timeRemaining = 0;
                    triggerTimeout();
                }
            }
        }

        drawUI();
        drawLasers();

        if (pauseTimer > 0) {
            pauseTimer--;
            if (pauseTimer <= 0) {
                questionNumber++;
                if (questionNumber > totalQuestions) endGame();
                else generateScenario();
            }
        } else {
            targets.forEach(target => target.update());
        }

        animationId = requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousedown', (e) => {
        initAudio(); 
        
        if (summaryScreen.style.display === 'block' || pauseTimer > 0) return; 

        const rect = canvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;

        lasers.push({ startX: canvas.width/2, startY: canvas.height, endX: clickX, endY: clickY, life: 10 });
        playSound('shoot', 1);

        if (gameState === 'START') {
            gameState = 'SELECTING';
            selectionScreen.style.display = 'block';
            ctx.fillStyle = '#1f2833';
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
            return;
        }

        if (gameState === 'SELECTING') return; 

        if (gameState === 'GAMEOVER') {
            const centralAlien = finalAliens[0];
            const dist = Math.sqrt((clickX - centralAlien.x) ** 2 + (clickY - centralAlien.y) ** 2);
            
            finalAliens.forEach(alien => alien.panic(clickX, clickY));

            if (dist <= 70) {
                const now = performance.now();
                const comboWindowActive = (now - lastComboHitTime) < COMBO_TIMEOUT;

                if (comboWindowActive) {
                    comboMultiplier++;
                } else {
                    comboMultiplier = 1;
                }

                bonusScore += Math.floor(100 * comboMultiplier);
                
                const pitch = Math.min(2.5, 1 + (comboMultiplier * 0.1));
                playSound('shoot', pitch);

                alienHue += Math.floor(Math.random() * 120) + 50; 
                ctx.fillStyle = `hsla(${(alienHue+180)%360}, 100%, 50%, 0.2)`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                lastComboHitTime = now; 
            } else {
                comboMultiplier = 1;
            }
            return; 
        }

        let hit = false;
        targets.forEach((target) => {
            const dist = Math.sqrt((clickX - target.x) ** 2 + (clickY - target.y) ** 2);
            if (dist <= target.radius && !hit) {
                hit = true;
                
                history.push({
                    qNum: questionNumber,
                    question: currentQuestion,
                    chosen: target.value,
                    correct: correctAnswer,
                    isRight: target.isCorrect,
                    formula: correctFormula
                });

                if (target.isCorrect) {
                    score++;
                    flashColor = 'rgba(102, 252, 241, 0.3)'; 
                    flashTimer = 10;
                    isTimerActive = false; 
                    
                    setTimeout(() => {
                        questionNumber++;
                        if (questionNumber > totalQuestions) endGame();
                        else generateScenario();
                    }, 200);
                } else {
                    playSound('error');
                    flashColor = 'rgba(231, 76, 60, 0.4)'; 
                    flashTimer = 10;
                    feedbackMsg = correctFormula;
                    pauseTimer = 180; 
                    isTimerActive = false; 
                }
            }
        });
    });

    function endGame() {
        gameState = 'GAMEOVER';
        alienHue = 0; 
        bonusScore = 0; 
        comboMultiplier = 1;
        isTimerActive = false;
        
        finalAliens = [];
        finalAliens.push(new FinalScreenAlien(true));
        const numPartyAliens = Math.random() * 15 + (score === 10 ? 30 : 15);
        for(let i=0; i<numPartyAliens; i++){
            finalAliens.push(new FinalScreenAlien(false));
        }

        restartBtn.style.display = 'block';
        showSummary(); 
        
        if (score === 10) {
            playSound('win');
            for(let i = 0; i < 150; i++) {
                confetti.push(new ConfettiParticle());
            }
        }
    }

    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
